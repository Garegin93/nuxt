name: Deploy to GitHub Pages

# Деплоим только когда код попадает в main.
on:
  push:
    branches: [main]
  # Позволяет запускать деплой вручную из вкладки Actions кнопкой "Run workflow".
  workflow_dispatch:

# Права, которые нужны для публикации на Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускаем два деплоя одновременно; новый отменяет предыдущий.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Генерируем статический сайт в .output/public.
      # NUXT_APP_BASE_URL нужен, потому что сайт лежит в подпапке /nuxt/,
      # а не в корне домена. Nuxt сам подхватывает эту переменную.
      - name: Generate static site
        run: yarn generate
        env:
          NUXT_APP_BASE_URL: /nuxt/

      # GitHub Pages по умолчанию обрабатывается Jekyll, который игнорирует
      # папки с "_" (а Nuxt складывает ассеты в _nuxt/). Этот файл отключает Jekyll.
      - name: Disable Jekyll
        run: touch .output/public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
